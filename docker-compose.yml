services:
  model-service:
    build: ./model-service
    container_name: java2cangjie-model
    ports:
      - "8001:8001"
    environment:
      - BASE_MODEL=${BASE_MODEL_PATH:-/models/base}
      - LORA_PATH=${LORA_PATH:-/app/outputs/qwen2.5b-instruct-lora}
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - ${BASE_MODEL_HOST_PATH:-/data/models/Qwen2.5-Coder-7B-Instruct}:/models/base:ro
      - ./model-service/outputs:/app/outputs:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      # 模型加载耗时较长，给足启动宽限期
      start_period: 120s

  spring-backend:
    build: ./spring-backend
    container_name: java2cangjie-backend
    ports:
      - "8080:8080"
    environment:
      - MODEL_SERVICE_BASE_URL=http://model-service:8001
      # 模型推理可能耗时 30~120 秒，读取超时相应调大
      - MODEL_SERVICE_CONNECT_TIMEOUT_MS=5000
      - MODEL_SERVICE_READ_TIMEOUT_MS=120000
    depends_on:
      model-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build: ./frontend
    container_name: java2cangjie-frontend
    ports:
      - "5173:80"
    depends_on:
      spring-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
