services:
  model-service:
    build: ./model-service
    container_name: java2cangjie-model
    ports:
      - "8001:8001"
    environment:
      - ASCEND_VISIBLE_DEVICES=0
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  spring-backend:
    build: ./spring-backend
    container_name: java2cangjie-backend
    ports:
      - "8080:8080"
    environment:
      - MODEL_SERVICE_BASE_URL=http://model-service:8001
    depends_on:
      model-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 20s

  frontend:
    build: ./frontend
    container_name: java2cangjie-frontend
    ports:
      - "5173:80"
    depends_on:
      spring-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
