version: "3.9"
services:
  model-service:
    build: ./model-service
    container_name: java2cangjie-model
    ports:
      - "8001:8001"
    environment:
      - ASCEND_VISIBLE_DEVICES=0

  spring-backend:
    build: ./spring-backend
    container_name: java2cangjie-backend
    ports:
      - "8080:8080"
    environment:
      - MODEL_SERVICE_BASE_URL=http://model-service:8001
    depends_on:
      - model-service

  frontend:
    build: ./frontend
    container_name: java2cangjie-frontend
    ports:
      - "5173:80"
    depends_on:
      - spring-backend
